<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>{{ page.title }} &larr; {{ page.top }}</title>
   <meta name="author" content="Hongyu Su" />

   <link rel='openid.server' href='https://www.myopenid.com/server' />
   <link rel='openid.delegate' href='https://www.hongyusu.com' />

   <link rel="start" href="/" />

	{% if page.keywords %}
	<meta name="keywords" content="{{ page.keywords }}">
	{% endif %}
	
	{% if page.feed %}
  	<link rel="alternate" type="application/atom+xml" href="{{ page.feed }}" title="RSS feed" />
	{% endif %}

   <!-- syntax highlighting CSS -->
   <link rel="stylesheet" href="/files/css/syntax.css" type="text/css" />

   <!-- Homepage CSS -->
   <link rel="stylesheet" href="/files/css/screen.css" type="text/css" />

</head>
<body id="{{ page.section }}">
<div id="site">

  {{ content }}
  
  <div id="footer">
	<address>
		<span class="copyright">
			Content by 
			<a href="/">Hongyu Su</a>
			<br/>
			(<a rel="licence" href="http://creativecommons.org/licenses/by-nc-sa/3.0/">Some rights reserved</a>)			
		</span>
		<span class="engine">
			<a href="https://jekyllrb.com/">Powered by Jekyll</a>
                        <br/>
			<a href="/">Personal Website</a>
		</span>
	</address>
  </div>
</div>

<!-- Latex goes here --> 
<script type="text/javascript" id="MathJax-script" async
 src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

<!-- Google Analytics 4 (GA4) -->

  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

</script>



<!-- disqus script goes here --> 
<script id="dsq-count-scr" src="//www-hongyusu-com.disqus.com/count.js" async></script>

</body>
</html>
